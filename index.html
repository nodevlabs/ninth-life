<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ninth Life</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a14; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; min-height: 100dvh; }
    /* Loading screen while scripts load */
    #loading {
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      min-height: 100vh; color: #94a3b8; font-family: Georgia, serif;
      background: #0a0a14;
    }
    #loading h1 {
      font-size: 28px; letter-spacing: 0.08em; margin-bottom: 8px;
      background: linear-gradient(135deg, #fbbf24, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #loading p { font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <h1>NINTH LIFE</h1>
      <p>loading...</p>
    </div>
  </div>

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Tone.js (audio engine) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <!-- Babel (so the browser can read JSX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Your game (includes mount) -->
  <script type="text/babel" src="game.jsx"></script>
</body>
</html>
