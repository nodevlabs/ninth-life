<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ninth Life</title>
  <meta name="description" content="A colony deckbuilder. Cats are cards. Seasons are suits. Survive the dark.">
  <meta name="theme-color" content="#0a0a1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow-x: hidden; }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      transition: opacity 0.8s ease-out;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    #loading img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center center;
      opacity: 0.6;
    }
    #loading .overlay {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      text-align: center; padding: 20px;
      margin-top: 18vh;
    }
    #loading h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(24px, 5vw, 36px); font-weight: 900;
      color: #fbbf24; letter-spacing: 10px;
      text-shadow: 0 0 40px #fbbf2466, 0 0 80px #fbbf2433, 0 2px 4px #000000aa;
      text-transform: uppercase;
    }
    #loading .sub {
      font-family: system-ui, sans-serif;
      font-size: clamp(10px, 2vw, 13px); color: #ffffff77;
      letter-spacing: 4px;
      text-shadow: 0 1px 3px #000000aa;
    }
    #loading .dots { display: flex; gap: 6px; margin-top: 12px; }
    #loading .dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: #fbbf24;
      animation: loadpulse 1.4s ease-in-out infinite;
    }
    #loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    #loading .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadpulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="loading.jpg" alt="">
    <div class="overlay">
      <h1>Ninth Life</h1>
      <div class="sub">THE LAST COLONY</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div id="root"></div>

  <!-- KEEP YOUR EXISTING SCRIPT TAGS BELOW -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script type="text/babel" data-type="module">
    import NinthLife from "./game.jsx";
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<NinthLife />);
  </script>

  <script>
    (function() {
      function hide() {
        var el = document.getElementById('loading');
        if (el) { el.classList.add('fade-out'); setTimeout(function() { el.remove(); }, 800); }
      }
      var t = setInterval(function() {
        var r = document.getElementById('root');
        if (r && r.children.length > 0) { clearInterval(t); setTimeout(hide, 300); }
      }, 100);
      setTimeout(hide, 10000);
    })();
  </script>
</body>
</html>
