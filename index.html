    #loading .bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, #0a0a14 0%, transparent 25%, transparent 70%, #0a0a14 100%);
    }
    #loading .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: loadFade 2s ease-out;
      margin-top: -25vh;
    }
    #loading p {
      font-size: 11px; opacity: 0.5; letter-spacing: 3px; color: #94a3b8;
    }
    #loading .dots {
      display: flex; gap: 4px; margin-top: 4px;
    }
    #loading .dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: #fbbf24; opacity: 0.3;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    #loading .dots span:nth-child(2) { animation-delay: 0.3s; }
    #loading .dots span:nth-child(3) { animation-delay: 0.6s; }
    @media (orientation: landscape) {
      #loading .bg {
        background-size: auto 100vh;
        background-position: center center;
      }
      #loading .content { margin-top: -20vh; }
    }
    @keyframes loadFade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dotPulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
  </style>
