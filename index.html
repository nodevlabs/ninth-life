<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ninth Life</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a14; overflow-x: hidden; -webkit-font-smoothing: antialiased; font-family: 'Manrope', sans-serif; }
    #root { min-height: 100vh; min-height: 100dvh; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      font-family: 'Manrope', sans-serif; background: #0a0a14; gap: 8px; z-index: 9999;
    }
    #loading p { font-size: 11px; opacity: 0.4; letter-spacing: 3px; color: #94a3b8; }
    #loading .dots { display: flex; gap: 4px; margin-top: 4px; }
    #loading .dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: #fbbf24; opacity: 0.3;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    #loading .dots span:nth-child(2) { animation-delay: 0.3s; }
    #loading .dots span:nth-child(3) { animation-delay: 0.6s; }
    @keyframes dotPulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <p>gathering the colony</p>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="game.js"></script>
</body>
</html>
